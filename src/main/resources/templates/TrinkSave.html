<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Trinkflasche hinzufügen</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <form th:action="@{/trink/save}" th:object="${trinkflasche}" method="post">
            <div class="form-group">
                <label>Marke der Trinkflasche</label>
                <input type="text" th:field="*{marke}" class="form-control">
            </div>

            <div class="form-group">
                <label>Liter in ml</label>
                <input type="number" th:field="*{liter}" class="form-control">
            </div>

            <div class="form-group">
                <label>Preis der Trinkflasche</label>
                <input type="number" th:field="*{preis}" class="form-control">
            </div>

            <div class="checkbox">
                <label>
                    <input type="checkbox" th:field="*{isolated}">
                    Ist isoliert?
                </label>
            </div>

            <div class="form-group">
                <label>Herstellungsdatum</label>
                <input type="date" th:field="*{herstellungsdatum}" class="form-control">
            </div>

            <input type="submit" class="form-control" value="Speichern">
        </form>
    </div>
</body>
</html>
