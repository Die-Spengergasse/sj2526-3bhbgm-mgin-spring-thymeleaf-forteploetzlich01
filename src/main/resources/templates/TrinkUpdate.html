<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trinkflasche Bearbeiten</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Trinkflasche Bearbeiten</h1>

    <form th:action="@{/trink/update}" th:object="${trinkflasche}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Marke:</label>
            <input type="text" class="form-control" th:field="*{marke}" />
        </div>
        <!-- Dieses html File macht einfach dass man die Parameter ändern kann -->
        <div class="form-group">
            <label>Preis:</label>
            <input type="number" step="0.01" class="form-control" th:field="*{preis}" />
        </div>

        <div class="form-group">
            <label>Isoliert:</label>
            <input type="checkbox" th:field="*{isolated}" />
        </div>

        <div class="form-group">
            <label>Herstellungsdatum:</label>
            <input type="date" class="form-control" th:field="*{herstellungsdatum}" />
        </div>

        <button type="submit" >Speichern</button>
        <a href="/trink/list" >Abbrechen</a>
    </form>
</div>
</body>
</html>
